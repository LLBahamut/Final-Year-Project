name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-and-check:
    name: Lint & Import Check
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with Ruff
        run: |
          ruff check . --output-format=github

      - name: Smoke-test imports
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "from config import GestureConfig; print('config.py OK')"
          python -c "import processor; print('processor.py OK')"
          python -c "import cv2, mediapipe, numpy, pynput; print('All core deps OK')"